<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact — kshiiteej</title>
<link rel="stylesheet" href="components/shared.css">
<style>

/* ── CONTACT PAGE — specific styles ─────────────────────────── */

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 140px var(--pad-x) 80px;
  position: relative; z-index: 10;
  border-bottom: var(--border-acid);
}
.hero-headline {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(72px, 13vw, 190px);
  line-height: 0.86; letter-spacing: 0.03em;
  color: var(--warm);
  animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.hero-subline {
  font-family: var(--mono);
  font-size: 12px; letter-spacing: 0.22em;
  color: rgba(200,216,74,0.45);
  margin-top: 24px;
  animation: fadeIn 0.8s ease 0.45s both;
}

/* ── FORM SECTION ── */
.form-section {
  position: relative; z-index: 10;
  padding: var(--pad-y) var(--pad-x) 100px;
}
.form-inner { max-width: 620px; }

.field { margin-bottom: 22px; }
.field-label {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.28em;
  color: var(--acid); opacity: 0.55;
  display: block; margin-bottom: 9px;
}
.field input,
.field textarea {
  width: 100%;
  background: rgba(200,216,74,0.03);
  border: 1px solid rgba(200,216,74,0.14);
  color: var(--warm);
  font-family: var(--body); font-size: 15px; font-weight: 300;
  padding: 15px 18px; outline: none;
  transition: border-color 0.2s;
  resize: none;
}
.field input::placeholder,
.field textarea::placeholder { color: rgba(242,237,228,0.2); }
.field input:focus,
.field textarea:focus { border-color: rgba(200,216,74,0.42); }
.field textarea { min-height: 130px; line-height: 1.72; }

.field-hint {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.14em;
  color: rgba(200,216,74,0.22);
  margin-top: 6px;
}

.submit-btn {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-top: 10px; padding: 20px 48px; width: 100%;
  background: var(--orange); color: var(--black); border: none;
  font-family: var(--mono); font-size: 13px; letter-spacing: 0.22em;
  transition: opacity 0.2s;
}
.submit-btn:hover { opacity: 0.88; }
.submit-btn:disabled { opacity: 0.38; pointer-events: none; }

.form-status {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  margin-top: 18px; min-height: 18px;
}
.form-status.err { color: var(--orange); }

/* ── SUCCESS STATE ── */
.success-state { display: none; padding-top: 4px; }
.success-state.show { display: block; }

.success-hl {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(44px, 7vw, 88px);
  line-height: 0.9; letter-spacing: 0.04em;
  color: var(--warm); margin-bottom: 20px;
}
.success-hl span { color: var(--orange); }

.success-sub {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.2em;
  color: rgba(200,216,74,0.4);
  margin-bottom: 36px;
}

.success-wa {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 36px;
  border: 1px solid rgba(200,216,74,0.25);
  color: var(--acid); text-decoration: none;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
  transition: border-color 0.2s, color 0.2s;
}
.success-wa:hover { border-color: var(--acid); }

/* ── SOCIALS ── */
.socials {
  margin-top: 52px; padding-top: 40px;
  border-top: var(--border-acid);
}
.soc-row {
  display: flex; align-items: center;
  gap: 32px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.soc-link {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
  color: rgba(200,216,74,0.35);
  transition: color 0.2s;
}
.soc-link:hover { color: var(--acid); }
.soc-link svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
.soc-dot { color: rgba(200,216,74,0.15); }

.details-row {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  color: rgba(242,237,228,0.18);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.details-row a {
  color: inherit; text-decoration: none;
  transition: color 0.2s;
}
.details-row a:hover { color: rgba(242,237,228,0.45); }
.details-sep { opacity: 0.4; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .hero { padding: 110px var(--pad-x) 64px; }
  .form-section { padding: 64px var(--pad-x) 100px; }
  .soc-row { gap: 20px; }
  .details-row { flex-direction: column; gap: 8px; align-items: flex-start; }
}

</style>
</head>

<div id="ticker-slot"></div>

<script src="components/shared.js"></script>
<script>
/* ── BOOT ── */
loadComponents(['bag-strip-slot']).then(() => {
  initNavActive();
  initReveal();
  initFooterAnimation();
});

/* ── FORM SUBMIT ── */
document.getElementById('joinForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn     = document.getElementById('submitBtn');
  const status  = document.getElementById('formStatus');
  const name    = document.getElementById('name').value.trim();
  const email   = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  if (!name) {
    status.textContent = '// name required';
    status.className = 'form-status err';
    return;
  }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    status.textContent = '// valid email required';
    status.className = 'form-status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'sending...';
  status.textContent = '';

  const body = new FormData();
  body.append('name', name);
  body.append('email', email);
  body.append('message', message);

  try {
    const res  = await fetch('mailer.php', { method: 'POST', body });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'error');

    let waText = `hi kshiiteej! i want to be part of the journey. my name is ${name}.`;
    if (message) waText += ` ${message}`;
    const waUrl = `https://wa.me/919820013990?text=${encodeURIComponent(waText)}`;

    document.getElementById('waLink').href = waUrl;
    window.open(waUrl, '_blank');

    this.style.display = 'none';
    document.getElementById('successState').classList.add('show');

  } catch(err) {
    status.textContent = '// something went wrong — email us directly';
    status.className = 'form-status err';
    btn.disabled = false;
    btn.textContent = 'be part of the journey →';
  }
});
</script>
